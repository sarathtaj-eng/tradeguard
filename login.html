
<!DOCTYPE html>
<html>


<head>
<title>TradeGuard Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{
    font-family:Arial,sans-serif;
    background:#07111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding:15px;
    box-sizing:border-box;
}

.login-box{
    background:#0d2038;
    width:90%;
    max-width:400px;
    padding:40px;
    border-radius:15px;
    border:1px solid #17365d;
    text-align:center;
    box-sizing:border-box;
}


h1{
    color:#ffc107;
    margin-bottom:10px;
}

p{
    color:#cccccc;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#102746;
    color:white;
    box-sizing:border-box;
}

input:focus{
    outline:1px solid #1a73e8;
}

button{
    width:100%;
    background:#ffc107;
    color:black;
    border:none;
    padding:12px;
    font-size:16px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.links{
    margin-top:20px;
}

.links a{
    color:#1a73e8;
    text-decoration:none;
}

.logo{
    font-size:48px;
    margin-bottom:10px;
}
    @media (max-width:768px){

    .login-box{
        width:100%;
        padding:40px 25px;
    }

    .logo{
        font-size:80px;
    }

    h1{
        font-size:42px;
    }

    p{
        font-size:20px;
    }

    input{
        height:60px;
        font-size:18px;
    }

    button{
        height:60px;
        font-size:20px;
    }
}

    
</style>

<script>
function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email==="admin@tradeguard.com" &&
       password==="Sarath")
    {
        window.location.href="dashboard.html";
    }
    else if(email==="client@tradeguard.com" &&
            password==="Client123")
    {
        window.location.href="client-dashboard.html";
    }
    else
    {
        alert("Invalid Login");
    }
}
</script>

</head>
<body>

<div class="login-box">

<div class="logo">🛡️</div>

<h1>TradeGuard EA</h1>

<p>Member Login</p>

<form onsubmit="login(); return false;">

<input
 type="email"
 id="email"
 placeholder="Email Address"
 required>

<input
 type="password"
 id="password"
 placeholder="Password"
 required>

<button type="submit">
    Login
</button>

</form>

<div class="links">

<p>
<a href="#">Forgot Password?</a>
</p>

<p>
Don't have an account?
<a href="pricing.html">Subscribe Now</a>
</p>

</div>

</div>

</body>
</html>
