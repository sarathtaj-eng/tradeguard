<!DOCTYPE html>
<html>
<head>
<title>TradeGuard Login</title>

<style>
    <script>

    let password = document.getElementById("password").value;

       password === "TradeGuard123")
    {

<script>
function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email==="admin@tradeguard.com" &&
       password==="TradeGuard123")
    {
        window.location.href="dashboard.html";
    }
    else if(email==="client@tradeguard.com" &&
            password==="Client123")
    {
        window.location.href="client-dashboard.html";
    }
    else
    {
        alert("Invalid Login");
    }
}
</script>
body{
    font-family:Arial,sans-serif;
    background:#07111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:#0d2038;
    width:400px;
    padding:40px;
    border-radius:15px;
    border:1px solid #17365d;
    text-align:center;
}

h1{
    color:#ffc107;
    margin-bottom:10px;
}

p{
    color:#cccccc;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#102746;
    color:white;
    box-sizing:border-box;
}

input:focus{
    outline:1px solid #1a73e8;
}

button{
    width:100%;
    background:#ffc107;
    color:black;
    border:none;
    padding:12px;
    font-size:16px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.links{
    margin-top:20px;
}

.links a{
    color:#1a73e8;
    text-decoration:none;
}

.logo{
    font-size:48px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">🛡️</div>

<h1>TradeGuard EA</h1>

<p>Member Login</p>
<form onsubmit="login(); return false;">

<input
    type="email"
    id="email"
    placeholder="Email Address"
    required>

<input
    type="password"
    id="password"
    placeholder="Password"
    required>

<button type="submit">
Login
</button>



</form>

<div class="links">
<p>
<a href="#">Forgot Password?</a>
</p>

<p>
Don't have an account?
<a href="pricing.html">Subscribe Now</a>
</p>
</div>

</div>

</body>
</html>
