<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeGuard Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#07111f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}


.login-box{
    width:380px;
    background:#0d2038;
    padding:40px;
    border-radius:15px;
    border:1px solid #17365d;
    text-align:center;
    box-sizing:border-box;
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    color:#ffc107;
    margin:10px 0;
}

p{
    color:#cccccc;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#102746;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

input:focus{
    outline:none;
    border:1px solid #1a73e8;
}

button{
    width:100%;
    padding:14px;
    background:#ffc107;
    color:black;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.links{
    margin-top:20px;
}

.links a{
    color:#1a73e8;
    text-decoration:none;
}

@media(max-width:768px){

.login-box{
    width:95%;
    padding:30px;
}

.logo{
    font-size:70px;
}

h1{
    font-size:36px;
}

input{
    height:55px;
    font-size:18px;
}

button{
    height:55px;
    font-size:20px;
}

}
    </style>
<script>
async function login() {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {

        const response = await fetch("https://tradeguard-api.onrender.com/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await response.json();

        if (response.ok) {

            // Save token and user
            localStorage.setItem("token", data.token);
            localStorage.setItem("user", JSON.stringify(data.user));

            // Redirect
            if (data.user.role === "admin") {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "client-dashboard.html";
            }

        } else {
            alert(data.message || "Invalid email or password");
        }

    } catch (error) {
        console.error(error);
        alert("Unable to connect to the server.");
    }

}
</script>
    
 </head>
<body>


<div class="login-box">

<div class="logo">🛡️</div>

<h1>TradeGuard EA</h1>

<p>Member Login</p>

<form onsubmit="login(); return false;">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="links">

<p><a href="#">Forgot Password?</a></p>

<p>
Don't have an account?
<a href="pricing.html">Subscribe Now</a>
</p>

</div>

</div>


</body>

</html>
