<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeGuard Client Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#07111f;
    color:white;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:230px;
    height:100%;
    background:#0d2038;
    border-right:1px solid #17365d;
}

.logo{
    text-align:center;
    padding:25px;
    font-size:26px;
    color:#ffc107;
    font-weight:bold;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    border-bottom:1px solid #17365d;
}

.sidebar a:hover{
    background:#17365d;
}

.main{
    margin-left:230px;
    padding:30px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:#0d2038;
    border:1px solid #17365d;
    border-radius:10px;
    padding:20px;
    width:220px;
}

.card h3{
    color:#ffc107;
    margin-top:0;
}

button{
    background:#ffc107;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

@media(max-width:768px){

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.main{
    margin-left:0;
}

.cards{
    flex-direction:column;
}

.card{
    width:100%;
}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
🛡️ TradeGuard
</div>

<a href="#">🏠 Dashboard</a>
<a href="#">📈 My EA</a>
<a href="#">⚙ EA Settings</a>
<a href="#">💳 Subscription</a>
<a href="#">👤 Profile</a>

<a href="#" onclick="logout()">🚪 Logout</a>

</div>

<div class="main">

<h1>Welcome <span id="username"></span></h1>

<div class="cards">

<div class="card">
<h3>Plan</h3>
<p id="plan">FREE TRIAL</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">ACTIVE</p>
</div>

<div class="card">
<h3>Trial Ends</h3>
<p id="trialEnd"></p>
</div>

<div class="card">
<h3>Trade Copier</h3>
<button onclick="location.href='copier.html'">
Open
</button>
</div>

</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

    window.location="login.html";

}

document.getElementById("username").innerHTML=user.username;
document.getElementById("plan").innerHTML=user.plan;
document.getElementById("status").innerHTML=user.account_status;
document.getElementById("trialEnd").innerHTML=user.trial_end;

function logout(){

localStorage.removeItem("user");
localStorage.removeItem("token");

window.location="login.html";

}

</script>

</body>
</html>
