<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>

body{
    background:#07111f;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:400px;
    background:#0d2038;
    padding:30px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#ffc107;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h2>Reset Password</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="New Password">

<button onclick="resetPassword()">
Reset Password
</button>

</div>

<script>

async function resetPassword(){

const response = await fetch(
"https://tradeguard-api.onrender.com/reset-password",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("email").value,

newPassword:document.getElementById("password").value

})

});

const data=await response.json();

alert(data.message);

}

</script>

</body>
</html>
