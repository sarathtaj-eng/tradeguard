
<!DOCTYPE html>
<html>
<head>
<title>TradeGuard Client Settings</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#07111f;
    color:white;
}

.container{
    max-width:800px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:#0d2038;
    border:1px solid #17365d;
    border-radius:12px;
    padding:25px;
}

h1{
    color:#ffc107;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#ffc107;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:12px;
    background:#102746;
    color:white;
    border:1px solid #244a78;
    border-radius:8px;
    box-sizing:border-box;
}

.btn{
    background:#ffc107;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.back-btn{
    margin-right:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>⚙ Client Settings</h1>

<p><strong>Client:</strong> Client 1</p>
<p><strong>Account:</strong> 98765432</p>

<div class="form-group">
<label>Copy Mode</label>
<select>
<option>Same Lot</option>
<option>Risk Multiplier</option>
<option selected>Fixed Lot</option>
<option>Balance Ratio</option>
</select>
</div>

<div class="form-group">
<label>Lot Size</label>
<input type="number" value="0.10">
</div>

<div class="form-group">
<label>Risk Multiplier</label>
<input type="number" value="1.00">
</div>

<div class="form-group">
<label>Maximum Lot</label>
<input type="number" value="2.00">
</div>

<div class="form-group">
<label>Maximum Trades</label>
<input type="number" value="5">
</div>

<div class="form-group">
<label>Daily Loss Limit ($)</label>
<input type="number" value="100">
</div>

<div class="form-group">
<label>Maximum Drawdown (%)</label>
<input type="number" value="10">
</div>

<button class="btn back-btn"
onclick="window.location.href='copier.html'">
← Back
</button>

<button class="btn">
💾 Save Settings
</button>

</div>

</div>

</body>
</html>
